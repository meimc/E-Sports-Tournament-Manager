<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./src/style.css" />

    <title>Cyber League</title>
  </head>
  <body class="bg-gray-800 text-white">
    <!-- <div id="pantallaInicio" class="h-screen flex justify-center items-center">
      <button
        id="btnIniciar"
        class="bg-green-700 px-6 py-3 text-2xl font-bold cursor-pointer border rounded-2xl border-green-500 shadow-lg shadow-green-200 ring-green-400"
      >
        Iniciar Torneo
      </button>
    </div>
-->
    <div id="app" class="hidden">
      <header
        class="flex justify-between items-center bg-gray-900 text-gray-200 p-6"
      >
        <h2 class="text-xl font-bold">Cyber League</h2>

        <nav class="flex gap-6">
          <a href="#" class="hover:text-blue-400">Equipos</a>
          <a href="#">Jugadores</a>
          <a href="#">Partidas</a>
          <a href="#">Ranking</a>
          <a href="#">Historial</a>
        </nav>
      </header>

      <main>
        <div class="flex justify-between bg-gray-700">
          <h2 class="text-3xl p-6 text-gray-200">Equipos</h2>
          <button
            id="btnNuevoEquipo"
            class="m-6 px-6 py-4 font-bold bg-green-800 border rounded-2xl border-green-500 hover:bg-green-600 hover:shadow-sm shadow-green-200 transition duration-300"
          >
            + Nuevo equipo
          </button>
        </div>

        <form
          id="registroEquipo"
          class="hidden grid-cols-2 gap-4 m-6 px-6 py-4 max-w-md bg-green-800 border border-green-500 rounded-3xl"
        >
          <label for="nombreEquipo">Nombre del equipo:</label>
          <input
            type="text"
            id="nombreEquipo"
            class="bg-gray-700 border-gray-500 rounded-lg mx-3"
            required
          />

          <label for="entrenador">Entrenador:</label>
          <input
            type="text"
            id="entrenador"
            class="bg-gray-700 border-gray-500 rounded-lg mx-3"
            required
          />

          <label for="numeroJugadores">Número de Jugadores:</label>
          <select
            id="numeroJugadores"
            class="bg-gray-700 border-gray-500 rounded-lg mx-3"
            required
          >
            <option value="">Selecciona</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>

          <button
            id="btnCrearEquipo"
            class="col-start-2 py-2 mx-3 bg-green-900 rounded-xl hover:bg-green-600 cursor-pointer active:bg-green-950 active:inset-shadow-sm active:inset-shadow-green-800"
            type="submit"
          >
            Crear equipo
          </button>
        </form>

        <div class="bg-gray-900">
          <p class="text-xl p-6">Jugador 1</p>
          <form
            id="registroJugador"
            class="grid grid-cols-3 gap-4 m-6 px-6 py-4 max-w-md bg-green-800 border border-green-500 rounded-3xl"
          >
            <label for="nombre">Nombre:</label>
            <input
              type="text"
              id="nombre"
              class="col-span-2 bg-gray-700 border-gray-500 rounded-lg mx-3"
              required
            />
            <label for="nickname">Nickname:</label>
            <input
              type="text"
              id="nickname"
              class="col-span-2 bg-gray-700 border-gray-500 rounded-lg mx-3"
              required
            />
            <label for="nivel">Nivel:</label>
            <input
              type="number"
              id="nivel"
              class="col-span-2 bg-gray-700 border-gray-500 rounded-lg mx-3"
              required
            />
            <button
              class="col-start-3 py-2 mx-3 bg-green-900 rounded-xl hover:bg-green-600 cursor-pointer active:bg-green-950 active:inset-shadow-sm active:inset-shadow-green-800"
              type="submit"
            >
              Registrar
            </button>
          </form>
        </div>
        <div id="listaEquipos" class="flex"></div>

        <h2 class="text-3xl mt-6 p-6 bg-gray-700">Jugadores</h2>

        <div id="listaJugadores" class="flex flex-wrap gap-4"></div>

        <h2 class="text-3xl mt-6 p-6 bg-gray-700 text-gray-200">Partidas</h2>
        <h2 class="text-3xl mt-6 p-6 bg-gray-700 text-gray-200">Ranking</h2>
        <h2 class="text-3xl mt-6 p-6 bg-gray-700 text-gray-200">Historial</h2>
      </main>

      <footer class="bg-gray-900 text-white py-4 mt-10">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
          <p class="text-sm text-center">© 2026 GameManager</p>

          <div class="flex gap-6 text-sm text-gray-200">
            <span>Proyecto JS</span>
            <span>Torneo Manager</span>
            <span>v1.0</span>
          </div>
        </div>
      </footer>
      <!-- </div> -->
    </div>
    <script src="./src/main.js"></script>
  </body>
</html>
